<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cheddar</title>
  <link id="favicon" rel="icon" type="image/png" href="imgs/cheddar.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Global top bar -->
  <div class="global-topbar">
    <div class="global-brand">
      <img src="imgs/cheddar.png" alt="Cheddar logo" class="global-brand-logo">
      <span class="global-brand-name">Cheddar</span>
    </div>
  </div>

  <!-- Name entry screen -->
  <div id="nameScreen" class="screen active with-topbar">
    <div class="card">
      <h1>Cheddar</h1>
      <p class="subtitle">a public chatroom for everyone</p>
      <input type="text" id="nameInput" placeholder="your name..." maxlength="20" autocomplete="off">
      <button id="nameNextBtn">Next →</button>
      <a href="admin.html" class="admin-link">⚙ admin</a>
    </div>
  </div>

  <!-- Room selection screen -->
  <div id="roomScreen" class="screen with-topbar">
    <div class="card card-wide">
      <div class="room-header">
        <h2>👋 hey <span id="roomGreetName"></span></h2>
        <button id="backToNameBtn" class="text-btn">← change name</button>
      </div>
      <p class="subtitle">pick a room or create your own</p>

      <div class="room-list-section">
        <div class="section-label">ROOMS</div>
        <div id="roomList" class="room-list">
          <div class="empty-rooms">Loading rooms...</div>
        </div>
      </div>

      <div class="divider"><span>OR</span></div>

      <div class="create-room">
        <div class="section-label">QUICK JOIN</div>
        <div class="room-input-row">
          <span class="hash">#</span>
          <input type="text" id="roomInput" placeholder="room-name" maxlength="30" autocomplete="off">
          <button id="joinRoomBtn">Join</button>
        </div>
        <p class="hint">letters, numbers, hyphens. no password = public room.</p>
      </div>
    </div>
  </div>

  <!-- Password prompt overlay -->
  <div id="passwordOverlay" class="overlay">
    <div class="overlay-card">
      <div class="lock-icon">🔒</div>
      <h3>Password required</h3>
      <p>Room <span id="pwRoomName"></span> is protected.</p>
      <input type="password" id="pwInput" placeholder="enter password..." autocomplete="off">
      <div id="pwError" class="pw-error"></div>
      <div class="overlay-buttons">
        <button id="pwCancelBtn" class="btn-secondary">Cancel</button>
        <button id="pwSubmitBtn" class="btn-primary">Enter</button>
      </div>
    </div>
  </div>

  <!-- Chat screen -->
  <div id="chatScreen" class="screen">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="online-label">ONLINE</span>
        <span id="onlineCount" class="online-count">0</span>
      </div>
      <div id="usersList"></div>
    </aside>

    <div class="chat-main">
      <header>
        <button id="toggleSidebarBtn" class="icon-btn" title="Toggle users">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </button>

        <div class="brand-cluster">
          <img src="imgs/cheddar.png" alt="" class="brand-logo">
          <div class="brand">
            <span class="brand-app-name">Cheddar</span>
            <span class="brand-divider">•</span>
            <span class="room-hash">#</span><span id="currentRoom">general</span>
          </div>
        </div>

        <div class="user-info">
          <span class="online-dot"></span>
          <span id="displayName"></span>
          <button id="leaveBtn" class="icon-btn danger" title="Leave room">✕</button>
        </div>
      </header>

      <main id="messages"></main>

      <footer>
        <div class="input-wrapper">
          <button id="emojiBtn" class="icon-btn" title="Emoji">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </button>
          <input type="text" id="msgInput" placeholder="type a message..." maxlength="500" autocomplete="off">
        </div>
        <button id="sendBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </footer>
    </div>

    <div id="emojiPicker" class="emoji-picker">
      <div class="emoji-tabs" id="emojiTabs"></div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
  </div>

  <script type="module" src="chat.js"></script>
</body>
</html>
